<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema Igreja Premium</title>
<link rel="stylesheet" href="style.css">
</head>
<body onload="listar()">
<h1>Dashboard Igreja Premium</h1>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin:20px;max-width:1100px;margin-left:auto;margin-right:auto;">
<div style="background:#1e293b;padding:24px;border-radius:16px;">👥 Total de Membros<br><strong id="totalMembros">0</strong></div>
<div style="background:#1e293b;padding:24px;border-radius:16px;">📉 Total de Faltas<br><strong id="totalFaltas">0</strong></div>
<div style="background:#1e293b;padding:24px;border-radius:16px;">📊 Sistema<br><strong>Online</strong></div>
<div style="background:#1e293b;padding:24px;border-radius:16px;">⛪ Cadastros Hoje<br><strong id="cadastrosHoje">0</strong></div>
</div>

<input id="nome" placeholder="Nome">
<input id="cargo" placeholder="Cargo">
<button onclick="salvar()">Cadastrar</button>
<button onclick="listar()">Atualizar Lista</button>

<ul id="lista"></ul>

<script src="scriptAlt.js"></script>
</body>
</html>
